name: Upload to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        # setup-uv stopped publishing major tags in v8; pin the full version
        uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: build
        run: uv build

      - name: publish
        run: uv publish
