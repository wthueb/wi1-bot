[tool.uv.workspace]
members = ["common", "arr", "bot", "webhook", "transcoder"]

[tool.uv.sources]
common = { workspace = true }
arr = { workspace = true }

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=9.1.1",
    "ruff>=0.15.20",
    "ty>=0.0.1",
]

[tool.ty.environment]
python-version = "3.12"

[tool.ty.terminal]
error-on-warning = true

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["wi1_bot"]

[tool.pytest]
testpaths = ["common", "arr", "bot", "webhook", "transcoder"]
